<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campo Minado Web</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="header">
        <h1>Campo Minado Web</h1>
        <div class="control-panel">
            <label for="difficulty">Dificuldade:</label>
            <select id="difficulty">
                <option value="facil">Fácil</option>
                <option value="medio">Médio</option>
                <option value="dificil">Difícil</option>
            </select>
            <button id="new-game-btn">Novo Jogo</button>
            <button id="restart-btn">Reiniciar</button>
            <span class="counter">💣 <span id="mine-count">0</span></span>
            <span class="counter">🚩 <span id="flag-count">0</span></span>
            <span class="counter">⏱️ <span id="timer">0</span>s</span>
            <button id="dark-mode-btn" title="Alternar modo escuro">🌙</button>
        </div>
    </header>
    <main class="main-content">
        <div id="board" class="board"></div>
        <section class="instructions">
            <h2>Como Jogar</h2>
            <ul>
                <li>Clique esquerdo: Revela a célula.</li>
                <li>Clique direito: Marca/desmarca bandeira.</li>
                <li>Revele todas as células seguras para vencer.</li>
                <li>Evite clicar em minas!</li>
            </ul>
        </section>
    </main>
    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <span id="modal-message"></span>
            <button id="modal-close-btn">Fechar</button>
            <button id="play-again-btn">Novo Jogo</button>
        </div>
    </div>
    <script src="script.js"></script>
    <footer style="text-align:center; margin:2rem 0 1rem 0; color:#888; font-size:0.95rem;">
        <p>Licença MIT &copy; 2026 - Livre para uso acadêmico e pessoal.</p>
    </footer>
</body>

</html>
