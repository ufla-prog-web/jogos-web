<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio na Estrada - Carminha Frufru</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <div id="game-screen">
        
        <div id="score-board">Pontos: <span id="score">0</span></div>

        <div id="carminha"></div>

        <div id="start-screen">
            <h2>Desafio da Carminha</h2>
            <p>Use as setas ⬅️ ➡️ para desviar.</p>
            <button id="start-btn">Iniciar Jogo</button>
        </div>

        <div id="game-over" class="hidden">
            <h2>Batida!</h2>
            <p>Pontuação Final: <span id="final-score">0</span></p>
            <button id="restart-btn">Tentar Novamente</button>
        </div>

    </div>

    <script src="./script.js"></script>
</body>
</html>
