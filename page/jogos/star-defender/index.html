<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Defender — Jogo Web</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Tela Inicial -->
    <div id="start-screen" class="screen">
        <div class="screen-content">
            <h1 class="game-title">⭐ STAR DEFENDER</h1>
            <p class="game-subtitle">Defenda a galáxia dos invasores!</p>
            <div class="instructions">
                <h3>Como Jogar</h3>
                <p><kbd>←</kbd> <kbd>→</kbd> ou <kbd>A</kbd> <kbd>D</kbd> — Mover</p>
                <p><kbd>Espaço</kbd> — Atirar</p>
                <p>Destrua inimigos e sobreviva o máximo possível!</p>
            </div>
            <button id="btn-start" class="btn-main">🚀 INICIAR JOGO</button>
        </div>
    </div>

    <!-- Tela do Jogo -->
    <div id="game-screen" class="screen hidden">
        <div id="hud">
            <div class="hud-item">
                <span class="hud-label">Pontos</span>
                <span id="hud-score" class="hud-value">0</span>
            </div>
            <div class="hud-item">
                <span class="hud-label">Nível</span>
                <span id="hud-level" class="hud-value">1</span>
            </div>
            <div class="hud-item">
                <span class="hud-label">Vidas</span>
                <span id="hud-lives" class="hud-value">❤️❤️❤️</span>
            </div>
            <div class="hud-item">
                <span class="hud-label">Recorde</span>
                <span id="hud-highscore" class="hud-value">0</span>
            </div>
        </div>
        <canvas id="game-canvas"></canvas>
    </div>

    <!-- Tela de Game Over -->
    <div id="gameover-screen" class="screen hidden">
        <div class="screen-content">
            <h1 class="gameover-title">💥 GAME OVER</h1>
            <div class="final-stats">
                <p>Pontuação Final: <span id="final-score" class="highlight">0</span></p>
                <p>Nível Alcançado: <span id="final-level" class="highlight">1</span></p>
                <p>Recorde: <span id="final-highscore" class="highlight">0</span></p>
            </div>
            <button id="btn-restart" class="btn-main">🔄 JOGAR NOVAMENTE</button>
            <button id="btn-menu" class="btn-secondary">🏠 MENU PRINCIPAL</button>
        </div>
    </div>

    <script src="js/game.js"></script>
</body>
</html>
