<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D Breakout Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles/style.css">
</head>
<body>
    <header>
        <h1 id="score">0</h1>
    </header>

    <div id="start-screen" class="overlay">
        <div class="overlay-content">
            <h2 class="screen-title">Breakout</h2>
            <p id="start-message">Pressione o botão para começar</p>
            <button id="start-button">Iniciar Jogo</button>
            <button id="high-scores-button">Ver Pontuações</button>
            <button id="clear-high-scores" class="hidden">Limpar Pontuações</button>
        </div>
    </div>

    <main class="container">
        <div class="grid"></div>
    </main>
    <footer>
        <div class="lives">
        </div>
        <div>
            <p id="audio-toggle">Audio: on</p>
        </div>
    </footer>
    <script src="./scripts/app.js"></script>
</body>
</html>
