<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Barbie Memory — Jogo da Memória</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffe4f0;
      --bg2: #fff0f7;
      --card-back: #ff69b4;
      --card-border: #ff1493;
      --accent: #ff1493;
      --accent2: #ff69b4;
      --hot-pink: #ff007f;
      --light-pink: #ffb6d9;
      --pale: #fff5fa;
      --gold: #f9c846;
      --text: #7d1046;
      --text-dim: #c0709a;
      --success: #ff69b4;
      --glow: rgba(255,20,147,0.35);
      --white: #ffffff;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Quicksand', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Layout */
    .wrap {
      position: relative;
      z-index: 1;
      max-width: 860px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    /* Header */
    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .crown {
      font-size: 2.5rem;
      display: block;
      margin-bottom: 0.2rem;
      animation: crownBounce 2s ease-in-out infinite;
    }
    @keyframes crownBounce {
      0%,100% { transform: translateY(0) rotate(-5deg); }
      50%      { transform: translateY(-8px) rotate(5deg); }
    }

    header h1 {
      font-family: 'Pacifico', cursive;
      font-size: clamp(2rem, 7vw, 3.5rem);
      background: linear-gradient(135deg, #ff007f, #ff69b4, #ff1493, #c0006e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 2px 8px rgba(255,20,147,0.3));
      letter-spacing: 0.02em;
    }
    header p {
      color: var(--text-dim);
      font-size: 0.9rem;
      margin-top: 0.4rem;
      font-weight: 600;
      letter-spacing: 0.08em;
    }

    /* Stats bar */
    .stats {
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 1.8rem;
    }
    .stat {
      background: var(--white);
      border: 2px solid var(--light-pink);
      border-radius: 20px;
      padding: 0.6rem 1.3rem;
      text-align: center;
      min-width: 90px;
      box-shadow: 0 4px 15px rgba(255,20,147,0.1);
    }
    .stat-label {
      font-size: 0.62rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-dim);
      font-weight: 700;
    }
    .stat-value {
      font-family: 'Pacifico', cursive;
      font-size: 1.3rem;
      color: var(--accent);
      margin-top: 2px;
      transition: transform 0.15s;
    }
    .stat-value.bump {
      transform: scale(1.35);
      color: var(--hot-pink);
    }

    /* Difficulty buttons */
    .difficulty {
      display: flex;
      justify-content: center;
      gap: 0.7rem;
      margin-bottom: 1.8rem;
      flex-wrap: wrap;
    }
    .diff-btn {
      font-family: 'Quicksand', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      padding: 0.5rem 1.3rem;
      border-radius: 30px;
      border: 2px solid var(--light-pink);
      background: var(--white);
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.25s;
    }
    .diff-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px var(--glow);
    }
    .diff-btn.active {
      background: linear-gradient(135deg, var(--hot-pink), var(--accent));
      border-color: var(--hot-pink);
      color: #fff;
      box-shadow: 0 4px 18px var(--glow);
      transform: translateY(-2px);
    }

    /* Timer bar */
    #timer-bar-wrap {
      background: var(--white);
      border: 2px solid var(--light-pink);
      border-radius: 10px;
      height: 10px;
      overflow: hidden;
      margin-bottom: 1.4rem;
      box-shadow: inset 0 2px 6px rgba(255,20,147,0.08);
    }
    #timer-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--hot-pink), var(--accent2), #ffb6d9);
      background-size: 200% 100%;
      animation: shimmer 2s linear infinite;
      transition: width 1s linear;
      width: 100%;
      border-radius: 10px;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: 0% 0; }
    }
    #timer-bar.danger {
      background: linear-gradient(90deg, #ff4500, #ff6b35);
      animation: none;
    }

    /* Rules */
    .rules {
      text-align: center;
      color: var(--text-dim);
      font-size: 0.8rem;
      margin-bottom: 1.4rem;
      font-weight: 600;
    }

    /* Grid */
    #grid {
      display: grid;
      gap: 0.85rem;
      justify-content: center;
    }

    /* Card */
    .card {
      width: 100%;
      aspect-ratio: 1;
      perspective: 700px;
      cursor: pointer;
    }
    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.55s cubic-bezier(.4,0,.2,1);
      border-radius: 18px;
    }
    .card.flipped .card-inner,
    .card.matched .card-inner { transform: rotateY(180deg); }

    .card-face {
      position: absolute;
      inset: 0;
      border-radius: 18px;
      backface-visibility: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Card back */
    .card-back {
      background: linear-gradient(145deg, #ff4da6, #ff007f);
      border: 3px solid rgba(255,255,255,0.4);
      font-size: 1.8rem;
      box-shadow: 0 6px 20px rgba(255,0,127,0.3), inset 0 1px 0 rgba(255,255,255,0.3);
    }
    .card-back::before {
      content: '🎀';
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      opacity: 0.9;
    }
    .card:hover:not(.flipped):not(.matched) .card-back {
      box-shadow: 0 8px 28px rgba(255,0,127,0.5), 0 0 0 3px rgba(255,255,255,0.5), inset 0 1px 0 rgba(255,255,255,0.3);
      transform: scale(1.04);
    }

    /* Card front */
    .card-front {
      transform: rotateY(180deg);
      background: linear-gradient(145deg, #fff0f7, #ffe4f0);
      border: 3px solid var(--light-pink);
      font-size: 2.4rem;
      box-shadow: 0 4px 15px rgba(255,20,147,0.15);
    }
    .card.matched .card-front {
      border-color: var(--hot-pink);
      background: linear-gradient(145deg, #fff, #ffe4f0);
      box-shadow: 0 0 24px rgba(255,0,127,0.4), 0 0 0 2px #ff69b4;
      animation: matchPulse 0.6s ease;
    }
    @keyframes matchPulse {
      0%   { transform: rotateY(180deg) scale(1); }
      40%  { transform: rotateY(180deg) scale(1.12); }
      70%  { transform: rotateY(180deg) scale(0.97); }
      100% { transform: rotateY(180deg) scale(1); }
    }

    .card.shake .card-inner {
      animation: shake 0.4s ease;
    }
    @keyframes shake {
      0%,100% { transform: rotateY(180deg) translateX(0); }
      25%      { transform: rotateY(180deg) translateX(-7px); }
      75%      { transform: rotateY(180deg) translateX(7px); }
    }

    /* Restart */
    .btn-restart {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin: 1.8rem auto 0;
      font-family: 'Quicksand', sans-serif;
      font-weight: 700;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      padding: 0.75rem 2rem;
      border-radius: 30px;
      border: 2px solid var(--accent);
      background: var(--white);
      color: var(--accent);
      cursor: pointer;
      transition: all 0.25s;
    }
    .btn-restart:hover {
      background: linear-gradient(135deg, var(--hot-pink), var(--accent));
      border-color: var(--hot-pink);
      color: #fff;
      box-shadow: 0 6px 20px var(--glow);
      transform: translateY(-2px);
    }

    /* Victory overlay */
    #victory {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(255,20,147,0.92);
      z-index: 100;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      padding: 2rem;
      animation: fadeIn 0.4s ease;
    }
    #victory.show { display: flex; }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

    .victory-box {
      background: #fff;
      border-radius: 30px;
      padding: 3rem 2.5rem 2.5rem;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(255,0,127,0.4);
      position: relative;
      overflow: hidden;
    }
    .victory-box::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 8px;
      background: linear-gradient(90deg, #ff007f, #ff69b4, #ffb6d9, #ff69b4, #ff007f);
      background-size: 200% 100%;
      animation: shimmer 1.5s linear infinite;
    }

    .victory-emoji { font-size: 4.5rem; margin-bottom: 0.8rem; animation: float 2s ease-in-out infinite; display: block; }
    @keyframes float {
      0%,100% { transform: translateY(0) rotate(-3deg); }
      50%      { transform: translateY(-14px) rotate(3deg); }
    }
    .victory-title {
      font-family: 'Pacifico', cursive;
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      color: var(--hot-pink);
      margin-bottom: 0.4rem;
    }
    .victory-sub {
      color: var(--text-dim);
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 0.3rem;
    }
    .victory-score {
      font-family: 'Pacifico', cursive;
      font-size: 2.2rem;
      color: var(--hot-pink);
      margin: 0.8rem 0 0.4rem;
    }
    .victory-stars {
      font-size: 2rem;
      margin-bottom: 1.2rem;
      letter-spacing: 0.2em;
    }
    .btn-play-again {
      font-family: 'Quicksand', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      padding: 0.85rem 2.4rem;
      border-radius: 30px;
      border: none;
      background: linear-gradient(135deg, #ff007f, #ff69b4);
      color: #fff;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(255,0,127,0.4);
      transition: transform 0.2s, box-shadow 0.2s;
      margin-top: 0.5rem;
    }
    .btn-play-again:hover {
      transform: scale(1.06) translateY(-2px);
      box-shadow: 0 10px 30px rgba(255,0,127,0.5);
    }
  </style>
</head>
<body>

<div class="wrap">
  <header>
    <span class="crown">👑</span>
    <h1>Barbie Memory</h1>
    <p>✨ Encontre todos os pares da Barbie! ✨</p>
  </header>

  <div class="stats">
    <div class="stat"><div class="stat-label">Tentativas</div><div class="stat-value" id="s-attempts">0</div></div>
    <div class="stat"><div class="stat-label">Pares</div><div class="stat-value" id="s-pairs">0</div></div>
    <div class="stat"><div class="stat-label">Tempo</div><div class="stat-value" id="s-time">0s</div></div>
    <div class="stat"><div class="stat-label">Pontuação</div><div class="stat-value" id="s-score">0</div></div>
  </div>

  <div class="difficulty">
    <button class="diff-btn active" data-pairs="6">🌸 FÁCIL</button>
    <button class="diff-btn" data-pairs="10">💄 MÉDIO</button>
    <button class="diff-btn" data-pairs="15">👠 DIFÍCIL</button>
  </div>

  <div id="timer-bar-wrap"><div id="timer-bar"></div></div>
  <div class="rules">💅 Vire duas cartas por vez · Pares certos ficam revelados!</div>
  <div id="grid"></div>
  <button class="btn-restart" onclick="restartGame()">🎀 Nova Partida</button>
</div>

<div id="victory">
  <div class="victory-box">
    <span class="victory-emoji" id="v-emoji">💖</span>
    <div class="victory-title" id="v-title">Arrasou!</div>
    <div class="victory-stars" id="v-stars"></div>
    <div class="victory-score" id="v-score"></div>
    <div class="victory-sub" id="v-detail"></div>
    <button class="btn-play-again" onclick="restartGame()">💖 Jogar Novamente</button>
  </div>
</div>

<script>
  const ALL_SYMBOLS = ['👠','💄','👗','👛','💅','🌸','💍','🪞','🎀','💖','🌺','💎','🛁','🫧','🌷'];
  const TIME_LIMITS = { 6: 60, 10: 90, 15: 140 };

  let state = {
    pairs: 6, cards: [], flipped: [], matched: 0, attempts: 0,
    score: 0, locked: false, timer: null, elapsed: 0, timeLimit: 60, gameOver: false
  };

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function buildCards(pairs) {
    const syms = shuffle(ALL_SYMBOLS).slice(0, pairs);
    return shuffle([...syms, ...syms].map((sym, i) => ({ id: i, sym, matched: false })));
  }

  // LÓGICA DE PONTUAÇÃO CORRIGIDA
  function calcScore() {
    if (state.matched === 0) return 0;
    // Ganha 100 pontos base por par encontrado
    const basePoints = state.matched * 100;
    // Bônus de precisão (penaliza tentativas erradas)
    const accuracyBonus = Math.max(0, 200 - (state.attempts - state.matched) * 15);
    // Bônus de tempo (apenas se ganhar o jogo)
    let timeBonus = 0;
    if (state.matched === state.pairs) {
      timeBonus = Math.max(0, Math.round((1 - state.elapsed / state.timeLimit) * 500));
    }
    return basePoints + accuracyBonus + timeBonus;
  }

  function renderGrid() {
    const grid = document.getElementById('grid');
    const totalCards = state.pairs * 2;
    const cols = totalCards <= 12 ? 4 : (totalCards <= 20 ? 5 : 6);
    grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
    grid.innerHTML = '';

    state.cards.forEach((c, idx) => {
      const div = document.createElement('div');
      div.className = 'card';
      div.dataset.idx = idx;
      div.innerHTML = `<div class="card-inner"><div class="card-face card-back"></div><div class="card-face card-front">${c.sym}</div></div>`;
      div.addEventListener('click', () => onCardClick(idx));
      grid.appendChild(div);
    });
  }

  function onCardClick(idx) {
    if (state.locked || state.gameOver || state.flipped.includes(idx) || state.cards[idx].matched) return;

    const cardEl = document.querySelector(`.card[data-idx="${idx}"]`);
    cardEl.classList.add('flipped');
    state.flipped.push(idx);

    if (state.flipped.length === 2) {
      state.attempts++;
      updateStat('s-attempts', state.attempts);
      state.locked = true;

      const [a, b] = state.flipped;
      if (state.cards[a].sym === state.cards[b].sym) {
        setTimeout(() => {
          [a, b].forEach(i => {
            state.cards[i].matched = true;
            document.querySelector(`.card[data-idx="${i}"]`).classList.add('matched');
          });
          state.matched++;
          updateStat('s-pairs', state.matched);
          state.score = calcScore();
          bumpStat('s-score', state.score);
          state.flipped = [];
          state.locked = false;
          if (state.matched === state.pairs) finishGame();
        }, 400);
      } else {
        setTimeout(() => {
          [a, b].forEach(i => {
            const el = document.querySelector(`.card[data-idx="${i}"]`);
            el.classList.add('shake');
            setTimeout(() => el.classList.remove('flipped', 'shake'), 400);
          });
          state.flipped = [];
          state.locked = false;
        }, 900);
      }
    }
  }

  function updateStat(id, val) { document.getElementById(id).textContent = val; }
  function bumpStat(id, val) { 
    const el = document.getElementById(id); 
    el.textContent = val; el.classList.add('bump'); 
    setTimeout(() => el.classList.remove('bump'), 200); 
  }

  function startTimer() {
    clearInterval(state.timer);
    state.elapsed = 0;
    const bar = document.getElementById('timer-bar');
    state.timer = setInterval(() => {
      state.elapsed++;
      updateStat('s-time', state.elapsed + 's');
      const pct = Math.max(0, 100 - (state.elapsed / state.timeLimit * 100));
      bar.style.width = pct + '%';
      if (pct < 25) bar.classList.add('danger');
      if (state.elapsed >= state.timeLimit) finishGame(true);
    }, 1000);
  }

  function finishGame(timeout = false) {
    state.gameOver = true;
    clearInterval(state.timer);
    state.score = calcScore();
    updateStat('s-score', state.score);

    const stars = timeout ? '💔' : (state.score >= 1000 ? '⭐⭐⭐' : (state.score >= 600 ? '⭐⭐' : '⭐'));
    document.getElementById('v-stars').textContent = stars;
    document.getElementById('v-score').textContent = state.score + ' pts';
    document.getElementById('v-detail').textContent = timeout ? "O tempo acabou!" : `Arrasou! Completou em ${state.elapsed}s`;
    document.getElementById('victory').classList.add('show');
  }

  function restartGame() {
    document.getElementById('victory').classList.remove('show');
    state.pairs = state.pairs; // Mantém a dificuldade atual
    state.cards = buildCards(state.pairs);
    state.flipped = []; state.matched = 0; state.attempts = 0; state.score = 0;
    state.locked = false; state.elapsed = 0; state.gameOver = false;
    state.timeLimit = TIME_LIMITS[state.pairs];
    
    updateStat('s-attempts', 0); updateStat('s-pairs', 0); updateStat('s-time', '0s'); updateStat('s-score', 0);
    const bar = document.getElementById('timer-bar');
    bar.style.width = '100%'; bar.classList.remove('danger');
    renderGrid();
    startTimer();
  }

  document.querySelectorAll('.diff-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.pairs = parseInt(btn.dataset.pairs);
      restartGame();
    });
  });

  restartGame(); // Inicia o jogo
</script>
</body>
</html>
