<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bounce Survival</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>BOUNCE SURVIVAL</h1>
        </div>
        
        <div class="game-wrapper">
            <canvas id="pongCanvas" width="1000" height="600"></canvas>
        </div>
        
        <div class="controls-panel">
            <div class="score-display">
                <span id="score">Pontuação: 0</span>
            </div>
            <div class="buttons">
                <button id="startBtn" class="btn btn-primary">▶ Iniciar Jogo</button>
                <button id="resetBtn" class="btn btn-secondary">🔄 Reiniciar</button>
            </div>
        </div>
    </div>
    
    <script src="js/script.js"></script>
</body>
</html>
