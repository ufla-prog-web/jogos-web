<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>THE MAZE RUNNER</title>
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>
  <div id="wrapper"><canvas id="canvas"></canvas></div>
  <div id="vignette"></div>

  <div id="mode-picker" aria-label="Escolha do modo de dificuldade">
    <button class="mode-btn" id="mode-normal" type="button">Normal</button>
    <button class="mode-btn" id="mode-hard" type="button">Difícil</button>
  </div>

  <div id="dpad">
    <div class="dpad-btn dpad-empty"></div>
    <button class="dpad-btn" id="bu">&#9650;</button>
    <div class="dpad-btn dpad-empty"></div>
    <button class="dpad-btn" id="bl">&#9664;</button>
    <div class="dpad-btn dpad-empty"></div>
    <button class="dpad-btn" id="br">&#9654;</button>
    <div class="dpad-btn dpad-empty"></div>
    <button class="dpad-btn" id="bd">&#9660;</button>
    <div class="dpad-btn dpad-empty"></div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
